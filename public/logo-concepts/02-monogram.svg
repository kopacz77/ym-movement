<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="mono-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <!-- Blue gradient background -->
  <rect width="512" height="512" rx="96" fill="url(#mono-bg)"/>
  <!-- Outer ring - thin elegant border -->
  <circle cx="256" cy="240" r="155" stroke="white" stroke-width="1.5" fill="none" opacity="0.3"/>
  <!-- Y letter - elegant, shares stroke with M -->
  <path d="M160 130 L225 225 L225 310"
        stroke="white" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M290 130 L225 225"
        stroke="white" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- M letter - interleaved with Y, sharing the vertical stroke -->
  <path d="M225 310 L225 225 L290 290 L355 225 L355 310"
        stroke="white" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Thin decorative line beneath -->
  <line x1="150" y1="345" x2="362" y2="345" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <!-- MOVEMENT text -->
  <text x="256" y="395" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="30" letter-spacing="12" fill="white" opacity="0.8">MOVEMENT</text>
</svg>