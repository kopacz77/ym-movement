<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg5)"/>
  <!-- Elegant script "Y" — flowing calligraphic form -->
  <!-- Y: starts upper-left, sweeps down to center, curves into descender -->
  <path d="M115 120
           C125 120, 140 125, 155 150
           C175 185, 195 220, 210 250
           C215 260, 218 262, 220 258"
        stroke="white" stroke-width="5.5" fill="none" stroke-linecap="round"/>
  <!-- Y right arm -->
  <path d="M235 115
           C230 118, 225 130, 222 150
           C218 175, 215 210, 213 250
           C212 260, 215 275, 220 290
           C228 320, 240 340, 245 350
           C248 356, 244 358, 238 355"
        stroke="white" stroke-width="5.5" fill="none" stroke-linecap="round"/>
  <!-- Connecting flourish from Y tail into M -->
  <path d="M238 355
           C250 345, 260 330, 270 310
           C275 300, 278 295, 280 300"
        stroke="white" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <!-- Script "M" — three flowing peaks -->
  <!-- M first upstroke -->
  <path d="M280 300
           C278 270, 280 240, 290 210
           C295 195, 300 185, 305 190"
        stroke="white" stroke-width="5.5" fill="none" stroke-linecap="round"/>
  <!-- M first valley and second peak -->
  <path d="M305 190
           C310 210, 318 250, 325 280
           C328 290, 330 292, 332 288
           C338 265, 345 235, 352 210
           C355 198, 358 190, 362 195"
        stroke="white" stroke-width="5.5" fill="none" stroke-linecap="round"/>
  <!-- M final downstroke with exit flourish -->
  <path d="M362 195
           C366 215, 372 255, 378 290
           C382 310, 388 325, 400 330
           C408 333, 412 328, 410 320"
        stroke="white" stroke-width="5.5" fill="none" stroke-linecap="round"/>
  <!-- Subtle underline flourish -->
  <path d="M150 380 C200 372, 300 368, 380 375"
        stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.35"/>
  <!-- MOVEMENT text beneath -->
  <text x="256" y="440" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="24" font-weight="300" letter-spacing="14" fill="white" opacity="0.85">MOVEMENT</text>
</svg>