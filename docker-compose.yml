# YM Movement Scheduler - Docker Compose Configuration
# Simplified Docker setup using Neon cloud database

version: '3.8'

services:
  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: ym-movement-app
    ports:
      - "3000:3000"
    environment:
      # Use .env file for all environment variables (including DATABASE_URL from Neon)
      - NODE_ENV=${NODE_ENV:-development}
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - GOOGLE_CLIENT_EMAIL=${GOOGLE_CLIENT_EMAIL}
      - GOOGLE_PRIVATE_KEY=${GOOGLE_PRIVATE_KEY}
      - GOOGLE_CALENDAR_ID=${GOOGLE_CALENDAR_ID}
      - INSTRUCTOR_EMAIL=${INSTRUCTOR_EMAIL}
      # Optional Redis (if configured)
      - REDIS_URL=${REDIS_URL:-}
    volumes:
      # Enable hot reload in development
      - .:/app
      - /app/node_modules
      - /app/.next
    command: pnpm dev
    networks:
      - ym-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis Cache (Optional - uncomment if needed)
  redis:
    image: redis:7-alpine
    container_name: ym-movement-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ym-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    profiles:
      - redis

volumes:
  redis_data:
    driver: local

networks:
  ym-network:
    driver: bridge