site_name: Yura Scheduler v3 Documentation
site_description: Enterprise-grade figure skating lesson scheduling platform with advanced performance optimizations, real-time analytics, and comprehensive student management
site_author: Yura Scheduler Team
site_url: https://yura-scheduler-docs.netlify.app

# Repository
repo_name: yura-scheduler-v3
repo_url: https://github.com/your-username/yura-scheduler-v3
edit_uri: edit/main/docs/

# Configuration
theme:
  name: material
  palette:
    # Palette toggle for light mode
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate

# Plugins
plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true

# Extensions
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

# Navigation
nav:
  - Home: index.md
  - Getting Started:
    - Contributing: contributing.md
    - Deployment: deployment.md
  - Development:
    - API Documentation: api.md
    - Style Guide: style-guide.md
    - Testing: testing.md
    - Troubleshooting: troubleshooting.md
  - Architecture:
    - Performance Optimization: optimization.md
    - Phase 2 Optimizations: phase2-optimizations.md
    - Security: security.md
    - Security Fixes Summary: security-fixes-summary.md

# Extra
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/your-username/yura-scheduler-v3
  version:
    provider: mike