name: Security Audit

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run security audit daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  security-audit:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: latest

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Run security audit
      run: pnpm audit
      continue-on-error: false

    - name: Run dependency check
      run: pnpm outdated || true

    - name: Run custom security audit
      run: pnpm run security:audit

    - name: Check for high-risk packages
      run: |
        echo "Checking for high-risk packages..."
        # Check for packages that are commonly vulnerable
        if pnpm list | grep -E "(lodash@[0-3]\.|moment@[0-2]\.|request@|npm@[0-5]\.)"; then
          echo "⚠️ High-risk packages detected!"
          exit 1
        else
          echo "✅ No high-risk packages found"
        fi

    - name: Validate security files
      run: |
        echo "Validating security files..."
        if [ ! -f "SECURITY.md" ]; then
          echo "❌ SECURITY.md is missing"
          exit 1
        fi
        if [ ! -f "src/lib/security.ts" ]; then
          echo "❌ Security utilities missing"
          exit 1
        fi
        echo "✅ Security files validated"

    - name: Check environment security
      run: |
        echo "Checking for security environment variables..."
        if grep -r "process\.env\." src/ | grep -v "NODE_ENV" | grep -v "\.env-validation\.ts"; then
          echo "⚠️ Direct environment variable access detected. Use env-validation.ts instead."
        fi
        echo "✅ Environment security check completed"

  dependabot-auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    needs: security-audit
    
    steps:
    - name: Enable auto-merge for Dependabot PRs
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.pulls.createReview({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: context.issue.number,
            event: "APPROVE"
          });
          
          github.rest.pulls.merge({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: context.issue.number,
            merge_method: "squash"
          });