name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Type check, lint, unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        # Unit tests don't hit the DB (prisma is mocked), but @prisma/client
        # imports need the generated client on disk.
        run: pnpm prisma generate

      - name: Type check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test:run

  build:
    name: Production build smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Build
        # Placeholder env values so `next build` doesn't try to connect anywhere.
        # The build statically analyzes server code; it does not hit the DB or
        # external services.
        env:
          DATABASE_URL: 'postgresql://ci:ci@localhost:5432/ci'
          NEXTAUTH_URL: 'https://ym-movement.com'
          NEXTAUTH_SECRET: 'ci-placeholder-secret-do-not-use-in-production'
          NEXT_PUBLIC_BASE_URL: 'https://ym-movement.com'
        run: pnpm build
