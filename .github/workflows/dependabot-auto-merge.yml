# Auto-approves and merges Dependabot PRs once CI passes.
#
# Policy (intentionally conservative for production code):
# - Patch updates (1.2.3 -> 1.2.4): auto-merge
# - Minor updates (1.2.3 -> 1.3.0): auto-merge
# - Security updates (any semver bump): auto-merge
# - Major updates (1.2.3 -> 2.0.0): NEVER auto-merge — require human review
#
# Auto-merge is queued via `gh pr merge --auto` so the PR only merges
# after all required status checks (defined as branch-protection rules
# on `main`) report success. If CI fails, the PR sits open until fixed.

name: Dependabot Auto-Merge

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve PR
        if: steps.meta.outputs.update-type != 'version-update:semver-major'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr review --approve "$PR_URL"

      - name: Enable auto-merge (squash)
        if: steps.meta.outputs.update-type != 'version-update:semver-major'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "$PR_URL"

      - name: Comment on major update
        if: steps.meta.outputs.update-type == 'version-update:semver-major'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          gh pr comment "$PR_URL" --body "Major version bump — auto-merge skipped. Review the changelog at the Dependabot summary above before merging manually."
