<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Yura Scheduler v3 Documentation</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Comprehensive documentation for Yura Scheduler v3 - Figure Skating Management Platform">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- Theme -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  
  <!-- Custom styles -->
  <style>
    :root {
      --theme-color: #0ea5e9;
      --theme-color-secondary: #0284c7;
    }
    
    .app-name-link img {
      width: 2rem;
      height: 2rem;
      margin-right: 0.5rem;
    }
    
    .markdown-section {
      max-width: 900px;
    }
    
    .sidebar-nav > ul > li > a {
      font-weight: 600;
    }
    
    /* Custom badge styles */
    .badge {
      display: inline-block;
      padding: 0.25rem 0.5rem;
      font-size: 0.75rem;
      font-weight: 500;
      border-radius: 0.375rem;
      margin-right: 0.5rem;
    }
    
    .badge-new {
      background-color: #10b981;
      color: white;
    }
    
    .badge-security {
      background-color: #ef4444;
      color: white;
    }
    
    .badge-guide {
      background-color: #3b82f6;
      color: white;
    }
    
    /* Code block improvements */
    pre[data-lang] {
      border-radius: 0.5rem;
    }
    
    /* Table improvements */
    .markdown-section table {
      border-radius: 0.5rem;
      overflow: hidden;
    }
    
    /* Sidebar improvements */
    .sidebar {
      border-right: 1px solid #e5e7eb;
    }
    
    /* Search improvements */
    .search input {
      border-radius: 0.5rem;
      border: 1px solid #d1d5db;
    }
    
    /* Navigation improvements */
    .github-corner svg {
      color: var(--theme-color);
    }
  </style>
</head>
<body>
  <div id="app">Loading documentation...</div>
  
  <script>
    window.$docsify = {
      name: 'Yura Scheduler v3',
      repo: 'https://github.com/your-username/yura-scheduler-v3',
      homepage: 'README.md',
      logo: '/icon.svg',
      
      // Sidebar configuration
      loadSidebar: true,
      autoHeader: true,
      subMaxLevel: 3,
      maxLevel: 4,
      
      // Navigation
      loadNavbar: true,
      mergeNavbar: true,
      
      // Search
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search documentation...',
        noData: 'No results found',
        depth: 6,
        hideOtherSidebarContent: false,
      },
      
      // Copy code
      copyCode: {
        buttonText: 'Copy',
        errorText: 'Error copying',
        successText: 'Copied!'
      },
      
      // Pagination
      pagination: {
        previousText: 'Previous',
        nextText: 'Next',
        crossChapter: true,
        crossChapterText: true,
      },
      
      // Tabs
      tabs: {
        persist: true,
        sync: true,
        theme: 'classic',
        tabComments: true,
        tabHeadings: true
      },
      
      // External link target
      externalLinkTarget: '_blank',
      
      // Corner logo
      cornerExternalLinkTarget: '_blank',
      
      // 404 page
      notFoundPage: true,
      
      // Code highlighting
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md',
        '/.*/_navbar.md': '/_navbar.md'
      },
      
      // Theme
      themeColor: '#0ea5e9',
      
      // Plugin configurations
      executeScript: true,
      
      // Footer
      plugins: [
        function(hook, vm) {
          hook.beforeEach(function(html) {
            // Add last updated date
            const lastUpdated = new Date().toLocaleDateString('en-US', {
              year: 'numeric',
              month: 'long',
              day: 'numeric'
            });
            
            return html + '\n\n---\n\n*Last updated: ' + lastUpdated + '*';
          });
          
          hook.doneEach(function() {
            // Add badges to specific pages
            const content = document.querySelector('.content');
            if (content && window.location.hash.includes('security')) {
              const badge = document.createElement('span');
              badge.className = 'badge badge-security';
              badge.textContent = 'Security Critical';
              content.querySelector('h1').appendChild(badge);
            }
          });
        }
      ]
    }
  </script>
  
  <!-- Core Docsify -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  
  <!-- Plugins -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-tabs@1"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-sql.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-docker.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  
  <!-- GitHub corner -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/external-script.min.js"></script>
  
  <!-- Mermaid for diagrams -->
  <script src="//cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-mermaid@2/dist/docsify-mermaid.js"></script>
  <script>mermaid.initialize({ startOnLoad: true });</script>
</body>
</html>
