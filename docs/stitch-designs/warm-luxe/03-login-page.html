<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - YM Movement</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600;1,700;1,900&amp;family=Space+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        espresso: {
                            DEFAULT: '#2a1810',
                            800: '#1f120c',
                            900: '#150c08',
                        },
                        gold: {
                            DEFAULT: '#d4a853',
                            hover: '#b58f46',
                        },
                        bronze: {
                            DEFAULT: '#8b6914',
                        },
                        cream: {
                            DEFAULT: '#f5f0e8',
                            dark: '#e8e1d5',
                        },
                        textlight: {
                            DEFAULT: '#faf7f2',
                            muted: '#dcd7ce',
                        }
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        "headline": ["Playfair Display", "serif"],
                        "display": ["Playfair Display", "serif"],
                        "body": ["Manrope", "sans-serif"],
                        "label": ["Space Grotesk", "sans-serif"]
                    },
                    boxShadow: {
                        'luxe': '0 10px 40px -10px rgba(212, 168, 83, 0.15)',
                        'luxe-inner': 'inset 0 2px 4px 0 rgba(212, 168, 83, 0.06)',
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #2a1810; /* fallback */
            color: #faf7f2;
        }
        h1, h2, h3, h4, h5, h6, .font-headline {
            font-family: 'Playfair Display', serif;
        }
        .font-label {
            font-family: 'Space Grotesk', sans-serif;
        }
        
        /* Subtle particle effect emulation via CSS gradient overlay */
        .particle-bg {
            background-image: radial-gradient(circle at 20% 30%, rgba(212, 168, 83, 0.05) 0%, transparent 5%),
                              radial-gradient(circle at 80% 40%, rgba(212, 168, 83, 0.04) 0%, transparent 4%),
                              radial-gradient(circle at 40% 80%, rgba(212, 168, 83, 0.06) 0%, transparent 6%),
                              radial-gradient(circle at 70% 90%, rgba(212, 168, 83, 0.03) 0%, transparent 3%);
            background-size: 100px 100px;
        }
    </style>
</head>
<body class="bg-espresso min-h-screen flex items-center justify-center overflow-x-hidden antialiased">
<!-- Split Screen Container -->
<div class="flex flex-col lg:flex-row w-full min-h-screen">
<!-- Left Panel: Brand / Mood (Espresso) -->
<div class="relative flex-1 bg-espresso flex flex-col justify-center items-center p-8 lg:p-24 overflow-hidden min-h-[409px] lg:min-h-screen">
<!-- Background Image with Overlay -->
<div class="absolute inset-0 z-0 opacity-40">
<img alt="Elegant ice skater silhouette on dark ice rink with dramatic spotlighting" class="w-full h-full object-cover" data-alt="Elegant ice skater silhouette on dark ice rink with dramatic spotlighting and subtle warm gold rim light on the edges" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA4dMAWQiriJs5L2quyf5Hv959SRJhUVPlBpqfIeOEfT9ucWmrxCjOufA5TzYrI8IKte3op8nVBoVVIKY6QpFO3yqxTvTHehLgJSRiD1vVNP65H_xM_9Gb8HEsCVzUmbxAj6xzV1WbG7mIBWrQLxicjfbQesEA6bC2vrpQwKwa8rOBZZol_ERi8M_Mwuhs3nv9jm-13wy4G-tBSFtXniVjIXXKqOrB6oHDpQPiRcKjaCl3hiUKlvbEEedKN02s_LtHbpqNWo2RIZ1Lj"/>
<div class="absolute inset-0 bg-gradient-to-t from-espresso via-espresso/80 to-transparent"></div>
<div class="absolute inset-0 particle-bg"></div>
</div>
<!-- Content -->
<div class="relative z-10 text-center max-w-lg mx-auto">
<h1 class="font-headline italic font-black text-5xl lg:text-7xl text-gold tracking-tight mb-4 drop-shadow-[0_4px_20px_rgba(212,168,83,0.3)]">
                    YM Movement
                </h1>
<p class="font-body text-textlight/90 text-lg lg:text-xl font-light tracking-wide uppercase mt-6 relative inline-block">
                    Elite Ice Dance Coaching
                    <span class="absolute -bottom-3 left-1/2 transform -translate-x-1/2 w-12 h-[1px] bg-gold/50"></span>
</p>
</div>
</div>
<!-- Right Panel: Login Form (Cream) -->
<div class="flex-1 bg-cream flex flex-col justify-center items-center p-8 lg:p-24 shadow-[-20px_0_40px_rgba(0,0,0,0.3)] z-20">
<div class="w-full max-w-md bg-white rounded-xl p-8 lg:p-12 shadow-luxe border border-gold/10">
<div class="text-center mb-10">
<h2 class="font-headline text-3xl font-bold text-espresso mb-2">Welcome Back</h2>
<p class="font-body text-espresso/60 text-sm">Sign in to access your training dashboard.</p>
</div>
<form action="#" class="space-y-6" method="POST">
<!-- Email Input -->
<div>
<label class="block font-label text-xs uppercase tracking-wider text-espresso/80 font-semibold mb-2" for="email">Email Address</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-espresso/40 text-lg">mail</span>
</span>
<input class="block w-full pl-10 pr-3 py-3 border border-espresso/10 rounded-lg text-espresso focus:ring-gold focus:border-gold bg-cream-dark/30 shadow-luxe-inner transition-colors duration-200 placeholder:text-espresso/30" id="email" name="email" placeholder="athlete@ymmovement.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div>
<div class="flex items-center justify-between mb-2">
<label class="block font-label text-xs uppercase tracking-wider text-espresso/80 font-semibold" for="password">Password</label>
<a class="font-body text-sm font-medium text-bronze hover:text-gold transition-colors duration-200" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-espresso/40 text-lg">lock</span>
</span>
<input class="block w-full pl-10 pr-3 py-3 border border-espresso/10 rounded-lg text-espresso focus:ring-gold focus:border-gold bg-cream-dark/30 shadow-luxe-inner transition-colors duration-200 placeholder:text-espresso/30" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="h-4 w-4 text-gold focus:ring-gold border-espresso/20 rounded bg-cream-dark/50" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-espresso/70 font-body" for="remember-me">
                            Remember me on this device
                        </label>
</div>
<!-- Submit Button -->
<div class="pt-2">
<button class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-espresso bg-gold hover:bg-gold-hover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gold transition-all duration-300 font-body tracking-wide shadow-[0_4px_14px_rgba(212,168,83,0.4)]" type="submit">
                            Sign In
                        </button>
</div>
</form>
<!-- Sign Up Link -->
<div class="mt-8 text-center border-t border-espresso/10 pt-6">
<p class="font-body text-sm text-espresso/60">
                        New student? 
                        <a class="font-semibold text-bronze hover:text-gold transition-colors duration-200" href="#">Sign up here</a>
</p>
</div>
</div>
</div>
</div>
</body></html>
